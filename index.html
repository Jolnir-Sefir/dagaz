function hypEnergy(h, cycle) {
  if (cycle < h.born) return null;
  if (h.death && cycle > h.death) return null;
  const age = cycle - h.born;
  if (h.correct) return Math.min(2, 1 + age * (h.type === "ded" ? 0.02 : 0.04));
  const life = h.death - h.born;
  return Math.max(0, 1 * (1 - (age / life) * 1.1));
}

function StatusBar({cycle}) {
  const d=REEF_DATA[cycle]||REEF_DATA[0];
  const phase=PHASES.find(p=>cycle>=p.start&&cycle<=p.end);
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 12px",background:"rgba(255,255,255,0.02)",borderRadius:"7px",border:"1px solid rgba(255,255,255,0.05)",marginBottom:"8px",flexWrap:"wrap",gap:"6px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        <span style={{fontFamily:"monospace",fontSize:"17px",fontWeight:800,color:"rgba(255,255,255,0.9)"}}>c{String(cycle).padStart(2,"0")}</span>
        <span style={{fontSize:"9px",padding:"2px 7px",borderRadius:"4px",background:phase?.color+"18",color:phase?.color,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}}>{phase?.name}</span>
      </div>
      <div style={{fontSize:"11px",color:"rgba(255,255,255,0.5)",flex:"1 1 200px",textAlign:"center"}}>{phase?.desc}</div>
      <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
        <span style={{fontSize:"15px"}}>{ACTION_ICONS[d.action]}</span>
        <span style={{fontSize:"10px",color:"rgba(255,255,255,0.6)",fontFamily:"monospace"}}>{d.action}</span>
      </div>
    </div>
  );
}
